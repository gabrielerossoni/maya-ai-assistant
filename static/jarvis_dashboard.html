<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAYA | Neural Interface</title>
    <link rel="icon" type="image/png" href="/static/maya_logo_no_sfondo.png">
    
    <!-- Three.js r128 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Leaflet 1.9.4 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --orb-color: 255, 30, 30;
            --bg-dark: #000000;
            --accent: #ff0000;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.4);
            --panel-bg: rgba(0, 0, 0, 0.95);
            --glass-border: 1px solid rgba(255, 0, 0, 0.5);
            --transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            --hud-color: rgba(255, 0, 0, 0.4);
        }

        @font-face {
            font-family: 'Geometos';
            src: url('https://fonts.cdnfonts.com/s/14885/Geometos.woff') format('woff');
        }

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Syncopate:wght@400;700&family=Sora:wght@100;300;400;600&display=swap');

        body {
            background: #050508;
            background-image: radial-gradient(ellipse 60% 50% at 50% 40%, 
                rgba(255,30,30,0.06) 0%, transparent 70%);
            color: var(--text-main);
            font-family: 'Sora', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            margin: 0;
        }

        /* --- TOP LOGO --- */
        #top-logo {
            position: fixed;
            top: 15px;
            left: 15px;
            width: 80px;
            height: 80px;
            z-index: 210;
            opacity: 0.6;
            filter: drop-shadow(0 0 5px rgba(255, 30, 30, 0.3));
            pointer-events: none;
            transition: var(--transition);
        }

        body.content-open #top-logo {
            opacity: 0;
            transform: translateX(-20px);
        }
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(0, 0, 0, 0.4) 100%);
            pointer-events: none;
            z-index: 201;
        }

        /* --- MAYA ORB --- */
        #maya-orb-container {
            position: fixed;
            top: 45%; left: 50%;
            transform: translate(-50%, -50%);
            width: 420px; height: 420px;
            z-index: 100;
            transition: var(--transition);
            cursor: pointer;
        }

        #maya-orb-container.corner {
            top: 24px; left: 24px;
            transform: translate(0, 0);
            width: 80px; height: 80px;
        }

        #orb-branding {
            position: fixed;
            top: 45%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Syncopate', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 12px;
            color: #ffffff;
            pointer-events: none;
            z-index: 102;
            text-align: center;
            opacity: 0.8;
            display: block;
            text-indent: 12px; /* Bilancia l'ultimo letter-spacing */
            transition: var(--transition);
        }

        body.content-open #orb-branding {
            top: 108px;
            left: 0;
            width: 128px;
            transform: translate(0, 0);
            font-size: 9px;
            letter-spacing: 4px;
            text-indent: 4px;
            opacity: 0.4;
            display: block;
        }

        #orb-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 101;
        }

        /* --- CLOCK --- */
        #idle-clock {
            position: fixed;
            top: 78%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            transition: var(--transition);
            pointer-events: none;
        }
        #idle-clock .time { 
            font-family: 'Sora', sans-serif;
            font-size: 58px; 
            font-weight: 100; 
            letter-spacing: -1px; 
            color: rgba(255, 255, 255, 0.35);
            text-shadow: none;
            line-height: 1;
        }
        #idle-clock .date { 
            font-family: 'Syncopate', sans-serif;
            font-size: 9px; 
            color: rgba(255, 255, 255, 0.35); 
            text-transform: uppercase; 
            letter-spacing: 0.5em;
            margin-top: 12px;
            opacity: 1;
        }
        
        body.content-open #idle-clock { opacity: 0; visibility: hidden; transform: translate(-50%, -60%); }

        /* --- CONTENT AREA --- */
        #content-area {
            position: fixed;
            top: 0; right: -75vw;
            width: 75vw; height: 100vh;
            background: rgba(3, 3, 6, 0.97);
            border-left: 1px solid rgba(255, 30, 30, 0.15);
            z-index: 50;
            transition: var(--transition);
            padding: 40px;
            overflow-y: auto;
            backdrop-filter: blur(20px);
        }

        #content-area.open { 
            right: 0; 
            padding: 48px 48px 48px 56px;
        }

        .panel { display: none; height: 100%; flex-direction: column; gap: 30px; }
        .panel.active { display: flex; animation: fadeIn 0.5s ease forwards; }

        @keyframes fadeIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        /* --- PANELS STYLING --- */
        #panel-weather .temp-main { font-size: 140px; font-weight: 100; line-height: 1; }
        #panel-weather .forecast-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; }
        
        #panel-map { height: 100%; width: 100%; border-radius: 12px; overflow: hidden; }
        #map-container { height: 100%; width: 100%; }

        #panel-browser iframe { width: 100%; height: 100%; border: none; border-radius: 12px; background: white; }

        #panel-news .news-list { display: flex; flex-direction: column; gap: 20px; }
        .news-item { 
            padding: 24px 28px; 
            border: 1px solid rgba(255,255,255,0.06); 
            border-radius: 16px; 
            background: rgba(255,255,255,0.02);
            cursor: pointer; 
            transition: all 0.2s ease; 
        }
        .news-item:hover { 
            background: rgba(255,255,255,0.04); 
            border-color: rgba(255,30,30,0.2);
            transform: translateX(4px);
        }
        .news-item .news-meta {
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 10px;
        }
        .news-item .news-source { opacity: 0.3; }
        .news-item .news-date { opacity: 0.2; }
        .news-item .news-title {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.9);
        }
        .news-item .news-summary {
            font-size: 12px;
            opacity: 0.4;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .news-item .news-more {
            font-size: 10px;
            margin-top: 12px;
            opacity: 0;
            transition: 0.2s;
        }
        .news-item:hover .news-more {
            opacity: 0.5;
        }

        #panel-dashboard .dash-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .stat-card { padding: 30px; border: var(--glass-border); border-radius: 16px; background: rgba(255,255,255,0.02); }
        .stat-card h3 { font-size: 12px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 10px; }
        .stat-card .val { font-size: 32px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }

        /* --- CMD INPUT --- */
        #cmd-container {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            z-index: 110;
            transition: var(--transition);
            display: flex;
            justify-content: center;
        }

        #cmd-container.corner {
            bottom: auto;
            top: 120px;
            left: 12px;
            transform: translateX(0);
            width: 104px;
            justify-content: flex-start;
        }

        #cmd-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 18px 30px;
            color: white;
            font-family: 'Sora', sans-serif;
            font-weight: 300;
            font-size: 16px;
            outline: none;
            backdrop-filter: blur(15px);
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        #cmd-input:focus {
            border-color: rgba(255, 30, 30, 0.4);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(255, 30, 30, 0.15);
        }

        #cmd-container.corner #cmd-input {
            text-align: left;
            padding: 8px 12px;
            font-size: 11px;
            border-radius: 20px;
            opacity: 0.5;
        }

        #cmd-input:focus {
            border-color: rgba(255, 30, 30, 0.4);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(255, 30, 30, 0.15);
            opacity: 1 !important;
        }

        /* --- LOG STRIP --- */
        #log-strip {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            padding: 10px 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            font-size: 12px;
            color: var(--text-dim);
            z-index: 100;
            pointer-events: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- ARDUINO CONTROLS --- */
        .device-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .device-btn { padding: 15px; border: var(--glass-border); border-radius: 12px; background: rgba(255,255,255,0.05); text-align: center; font-weight: 600; }
        .device-btn.on { border-color: #4CAF50; color: #4CAF50; box-shadow: 0 0 10px rgba(76,175,80,0.2); }
    </style>
</head>
<body>
    <img src="/static/maya_logo_no_sfondo.png" id="top-logo" alt="MAYA Logo">
    <canvas id="bg-canvas"></canvas>
    
    <div id="maya-orb-container" onclick="handleOrbClick()">
        <canvas id="orb-canvas"></canvas>
    </div>
    <div id="orb-branding">MAYA</div>

    <div id="idle-clock">
        <div class="time" id="clock-time">00:00</div>
        <div class="date" id="clock-date">LUNEDÌ, 1 GENNAIO</div>
    </div>

    <div id="cmd-container">
        <input type="text" id="cmd-input" placeholder="Comando neurale..." onkeydown="if(event.key==='Enter') sendCmd()">
    </div>

    <div id="content-area">
        <div style="height:0"></div>
        <div id="panel-weather" class="panel">
            <h2 id="weather-city">Località</h2>
            <div class="temp-main"><span id="weather-temp">--</span>°</div>
            <div id="weather-desc" style="text-transform: uppercase; letter-spacing: 2px;">--</div>
            <div class="forecast-grid" id="weather-forecast"></div>
        </div>

        <div id="panel-map" class="panel">
            <div id="map-container"></div>
        </div>

        <div id="panel-browser" class="panel">
            <iframe id="browser-iframe" src="about:blank"></iframe>
        </div>

        <div id="panel-news" class="panel">
            <div style="font-size:10px; letter-spacing:0.4em; opacity:0.2; 
            text-transform:uppercase; margin-bottom:32px; 
            padding-bottom:16px; border-bottom:1px solid rgba(255,255,255,0.05)">
              FEED NOTIZIE — AGGIORNAMENTO IN TEMPO REALE
            </div>
            <h2>Ultime Notizie</h2>
            <div class="news-list" id="news-list"></div>
        </div>

        <div id="panel-dashboard" class="panel">
            <h2>Sistema & Domotica</h2>
            <div class="dash-grid">
                <div class="stat-card">
                    <h3>Neural Load (CPU)</h3>
                    <div class="val" id="dash-cpu">--%</div>
                </div>
                <div class="stat-card">
                    <h3>Memory Unit (RAM)</h3>
                    <div class="val" id="dash-ram">--%</div>
                </div>
            </div>
            <div class="device-grid" style="margin-top: 20px;">
                <div id="dash-led" class="device-btn">LUCI</div>
                <div id="dash-relay" class="device-btn">RELAIS</div>
                <div id="dash-servo" class="device-btn">SERVO</div>
            </div>
        </div>
    </div>

    <div id="log-strip" id="log-text">MAYA System Online...</div>

    <script>
        let ws;
        let map;
        let audioContext, analyser, dataArray;
        let orbState = 'idle';
        
        // --- THREE.JS GLOBALS ---
        let scene, camera, renderer, mainOrb, originalPositions;

        // --- CLOCK ---
        function initClock() {
            const timeEl = document.getElementById('clock-time');
            const dateEl = document.getElementById('clock-date');
            
            function update() {
                const now = new Date();
                if (timeEl) {
                    timeEl.textContent = now.toLocaleTimeString('it-IT', {
                        hour: '2-digit', 
                        minute: '2-digit'
                    });
                }
                if (dateEl) {
                    dateEl.textContent = now.toLocaleDateString('it-IT', {
                        weekday: 'long', 
                        day: 'numeric', 
                        month: 'long'
                    }).toUpperCase();
                }
            }
            setInterval(update, 1000);
            update();
        }

        // --- BACKGROUND PARTICLES ---
        function initBackground() {
            const canvas = document.getElementById('bg-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let pts = [];
            
            const resize = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            };
            window.addEventListener('resize', resize);
            resize();

            for(let i=0; i<150; i++) {
                pts.push({
                    x: Math.random()*canvas.width,
                    y: Math.random()*canvas.height,
                    vx: (Math.random()-0.5)*0.5,
                    vy: (Math.random()-0.5)*0.5,
                    r: Math.random()*0.8
                });
            }

            function anim() {
                ctx.clearRect(0,0,canvas.width, canvas.height);
                ctx.fillStyle = 'rgba(255,255,255,0.15)';
                pts.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    if(p.x<0) p.x=canvas.width; if(p.x>canvas.width) p.x=0;
                    if(p.y<0) p.y=canvas.height; if(p.y>canvas.height) p.y=0;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                    ctx.fill();
                });
                requestAnimationFrame(anim);
            }
            anim();
        }

        // --- THREE.JS ORB ---
        function initThree() {
            const container = document.getElementById('maya-orb-container');
            const canvas = document.getElementById('orb-canvas');
            if (!container || !canvas) return;

            const w = container.clientWidth;
            const h = container.clientHeight;
            canvas.width = w;
            canvas.height = h;

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
            camera.position.z = 3.5;

            renderer = new THREE.WebGLRenderer({ 
                canvas: canvas,
                alpha: true, 
                antialias: true 
            });
            renderer.setSize(w, h);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setClearColor(0x000000, 0);

            // 1. CORE SOLIDO
            const coreGeom = new THREE.SphereGeometry(0.65, 64, 64);
            const coreMat = new THREE.MeshBasicMaterial({
                color: 0xff1e1e, // Rosso (255, 30, 30)
                transparent: true,
                opacity: 0.08,
                blending: THREE.AdditiveBlending
            });
            mainOrb = new THREE.Mesh(coreGeom, coreMat);
            originalPositions = coreGeom.attributes.position.array.slice();
            scene.add(mainOrb);

            // 2. TRE SFERE GLOW CONCENTRICHE
            window.glowSpheres = [];
            const glowLayers = [
                { r: 0.68, op: 0.20 },
                { r: 0.78, op: 0.10 },
                { r: 0.95, op: 0.04 }
            ];
            glowLayers.forEach(layer => {
                const gGeom = new THREE.SphereGeometry(layer.r, 32, 32);
                const gMat = new THREE.MeshBasicMaterial({
                    color: 0xff1e1e,
                    transparent: true,
                    opacity: layer.op,
                    blending: THREE.AdditiveBlending
                });
                const gMesh = new THREE.Mesh(gGeom, gMat);
                scene.add(gMesh);
                window.glowSpheres.push({ mesh: gMesh, baseOpacity: layer.op, baseRadius: layer.r });
            });

            // 3. PARTICELLE NEBULA
            const nebulaGeom = new THREE.BufferGeometry();
            const nebulaCount = 4000;
            const nebulaPos = new Float32Array(nebulaCount * 3);
            for(let i=0; i<nebulaCount; i++) {
                const r = 0.90 + Math.random() * 0.15; // Banda stretta 0.90-1.05
                const phi = Math.random() * Math.PI * 2;
                const theta = Math.random() * Math.PI;
                nebulaPos[i*3] = r * Math.sin(theta) * Math.cos(phi);
                nebulaPos[i*3+1] = r * Math.sin(theta) * Math.sin(phi);
                nebulaPos[i*3+2] = r * Math.cos(theta);
            }
            nebulaGeom.setAttribute('position', new THREE.BufferAttribute(nebulaPos, 3));
            const nebulaMat = new THREE.PointsMaterial({ 
                color: 0xff1e1e, 
                size: 0.006, 
                transparent: true, 
                opacity: 0.5,
                blending: THREE.AdditiveBlending 
            });
            window.nebulaParticles = new THREE.Points(nebulaGeom, nebulaMat);
            scene.add(window.nebulaParticles);

            // 4. OUTER RING PUNTI
            const ringPointCount = 80;
            const ringPos = new Float32Array(ringPointCount * 3);
            for(let i=0; i<ringPointCount; i++) {
                const angle = (i / ringPointCount) * Math.PI * 2;
                const r = 1.1;
                ringPos[i*3] = r * Math.cos(angle);
                ringPos[i*3+1] = r * Math.sin(angle);
                ringPos[i*3+2] = 0;
            }
            const ringGeom = new THREE.BufferGeometry();
            ringGeom.setAttribute('position', new THREE.BufferAttribute(ringPos, 3));
            const ringMat = new THREE.PointsMaterial({
                color: 0xff1e1e,
                size: 0.015,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending
            });
            window.outerRingPoints = new THREE.Points(ringGeom, ringMat);
            scene.add(window.outerRingPoints);
        }

        function animate(time) {
            requestAnimationFrame(animate);
            if (!renderer || !mainOrb) return;

            const t = time * 0.001;
            const rgb = getComputedStyle(document.documentElement).getPropertyValue('--orb-color').trim() || "255, 30, 30";
            const color = new THREE.Color(`rgb(${rgb})`);

            // Audio Analysis Ultra-Sensitive
            let audioLevel = 0;
            if (dataArray) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for (let i = 0; i < 64; i++) sum += dataArray[i];
                audioLevel = (sum / (64 * 255)) * 1.5;
            }

            // --- ANIMAZIONE REATTIVA ---
            // Se audioLevel è molto basso, l'orb è quasi immobile (idle cinematico)
            const isSpeaking = audioLevel > 0.05;
            const moveFactor = isSpeaking ? audioLevel * 2.0 : 0.02; // Quasi fermo se non si parla
            const speedFactor = isSpeaking ? 4.0 : 0.5; // Molto lento se non si parla
            
            // 1. Deformazione Core (Triple Sin Organico)
            const pos = mainOrb.geometry.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                const ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;
                const ox = originalPositions[ix], oy = originalPositions[iy], oz = originalPositions[iz];
                const vec = new THREE.Vector3(ox, oy, oz).normalize();
                
                // Triple sin deformation
                const deform = (Math.sin(t * 1.3 + ox * 2.1) + Math.sin(t * 0.7 + oy * 1.8) + Math.sin(t * 1.9 + oz * 2.4)) / 3.0;
                const d = 0.65 + deform * 0.06;
                
                pos.array[ix] = vec.x * d;
                pos.array[iy] = vec.y * d;
                pos.array[iz] = vec.z * d;
            }
            pos.needsUpdate = true;

            // 2. Glow Spheres (Scaling reattivo, NO deformazione)
            if (window.glowSpheres) {
                window.glowSpheres.forEach(layer => {
                    const scale = 1.0 + audioLevel * 0.15;
                    layer.mesh.scale.setScalar(scale);
                    layer.mesh.material.color = color;
                });
            }

            // 3. Nebula Particles
            if (window.nebulaParticles) {
                window.nebulaParticles.rotation.y += 0.002 + (isSpeaking ? audioLevel * 0.03 : 0);
                window.nebulaParticles.rotation.z += 0.001;
                window.nebulaParticles.material.opacity = isSpeaking ? (0.3 + audioLevel * 0.4) : 0.25;
                window.nebulaParticles.material.color = color;
            }

            // 4. Outer Ring Points
            if (window.outerRingPoints) {
                window.outerRingPoints.rotation.z -= 0.005;
                window.outerRingPoints.material.color = color;
            }
            
            mainOrb.material.color = color;
            
            // Scaling globale "battito"
            const pulse = isSpeaking ? (Math.sin(t * 10) * 0.01 + audioLevel * 0.05) : (Math.sin(t * 2) * 0.005);
            const scale = 1.0 + pulse;
            scene.scale.setScalar(scale);

            renderer.render(scene, camera);
        }

        // --- MAIN ENTRY POINT ---
        window.addEventListener('load', async () => {
            initBackground();
            initClock();
            initThree();
            animate();
            initWS();
        });


        function handleResize() {
            const container = document.getElementById('maya-orb-container');
            const w = container.clientWidth;
            const h = container.clientHeight;
            
            if (renderer) {
                renderer.setSize(w, h);
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
            }
        }
        
        // Sostituiamo il vecchio onresize
        window.addEventListener('resize', () => {
            // Background canvas resize logic
            const bgCanvas = document.getElementById('bg-canvas');
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
            handleResize();
        });


        async function initAudio() {
            if(audioContext) return;
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            } catch(e) { 
                console.log("Audio Init Failed (Permission Denied?):", e); 
                dataArray = new Uint8Array(128).fill(0);
            }
        }

        // --- WEBSOCKET & LOGIC ---
        function initWS() {
            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${proto}//${location.host}/ws`);
            
            ws.onmessage = (e) => {
                const d = JSON.parse(e.data);
                
        if (d.type === 'layout') setLayout(d.layout, d.params);
        if (d.type === 'voice_status') setOrbState(d.status.toLowerCase());
        if (d.type === 'news' && d.articles) {
            updateNews(d.articles);
            // Il pannello non si apre più automaticamente qui,
            // si affida al comando 'layout' inviato dall'agente se necessario.
        }
                if(d.type === 'state') updateArduino(d);
                if(d.type === 'spotify') {
                    if(d.is_playing) document.getElementById('log-strip').innerText = `♫ SPOTIFY: ${d.track} - ${d.artist}`;
                }
                if(d.type === 'stream') document.getElementById('log-strip').innerText = d.full_text;
            };

            ws.onopen = () => {
                document.getElementById('log-strip').innerText = "MAYA Neural Link Established.";
                initAudio();
            };
        }

        function setOrbState(status) {
            orbState = status || 'idle';
            document.body.className = orbState;
            document.getElementById('log-strip').innerText = `MAYA | ${orbState.toUpperCase()}`;
        }

        function setLayout(layout, params = {}) {
            const orb = document.getElementById('maya-orb-container');
            const content = document.getElementById('content-area');
            const cmd = document.getElementById('cmd-container');
            const cmdInput = document.getElementById('cmd-input');
            
            if(layout === 'orb') {
                orb.classList.remove('corner');
                content.classList.remove('open');
                cmd.classList.remove('corner');
                document.body.classList.remove('content-open');
                cmdInput.placeholder = "Comando neurale...";
                // Update Three.js size after CSS transition
                setTimeout(handleResize, 600);
                return;
            }

            orb.classList.add('corner');
            content.classList.add('open');
            cmd.classList.add('corner');
            document.body.classList.add('content-open');
            cmdInput.placeholder = "comando...";
            // Update Three.js size after CSS transition
            setTimeout(handleResize, 600);

            // Switch Panel
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            const target = document.getElementById(`panel-${layout}`);
            if(target) target.classList.add('active');

            if(layout === 'map' && params.location) updateMap(params.location);
            if(layout === 'browser' && params.url) document.getElementById('browser-iframe').src = params.url;
        }

        function handleOrbClick() {
            if(document.getElementById('maya-orb-container').classList.contains('corner')) {
                setLayout('orb');
            }
        }

        function sendCmd() {
            const input = document.getElementById('cmd-input');
            if(!input.value.trim()) return;
            ws.send(JSON.stringify({ type: 'command', text: input.value }));
            input.value = '';
        }

        // --- PANEL UPDATES ---
        function updateWeather(data) {
            document.getElementById('weather-city').innerText = data.location;
            document.getElementById('weather-temp').innerText = Math.round(data.temp);
            document.getElementById('weather-desc').innerText = "CONDIZIONI ATTUALI";
            
            const grid = document.getElementById('weather-forecast');
            grid.innerHTML = data.daily.map(day => `
                <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:12px; text-align:center;">
                    <div style="font-size:10px; opacity:0.5;">${new Date(day.date).toLocaleDateString('it-IT', {weekday:'short'})}</div>
                    <div style="font-weight:bold; margin:5px 0;">${Math.round(day.max)}°</div>
                    <div style="font-size:10px; opacity:0.3;">${Math.round(day.min)}°</div>
                </div>
            `).join('');
        }

        function updateNews(articles) {
            const list = document.getElementById('news-list');
            list.innerHTML = articles.map(a => `
                <div class="news-item" onclick="setLayout('browser', {url: '${a.link}'})">
                    <div class="news-meta">
                        <span class="news-source">${a.source || 'MAYA FEED'}</span>
                        <span class="news-date">${new Date().toLocaleDateString('it-IT')}</span>
                    </div>
                    <div class="news-title">${a.title}</div>
                    <div class="news-summary">${a.summary}</div>
                    <div class="news-more">Leggi →</div>
                </div>
            `).join('');
        }

        function updateArduino(d) {
            const setBtn = (id, val) => {
                const el = document.getElementById(id);
                if(val === 'on' || val === 'open' || val === true) el.classList.add('on');
                else el.classList.remove('on');
            };
            if(d.led) setBtn('dash-led', d.led);
            if(d.relay) setBtn('dash-relay', d.relay);
            if(d.servo) setBtn('dash-servo', d.servo);
        }

        async function updateMap(query) {
            if(!map) {
                map = L.map('map-container', { zoomControl: false }).setView([41.9, 12.5], 10);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; CartoDB'
                }).addTo(map);
            }
            
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1`);
                const data = await res.json();
                if(data[0]) {
                    const { lat, lon } = data[0];
                    map.setView([lat, lon], 13);
                    L.marker([lat, lon]).addTo(map);
                }
            } catch(e) { console.error("Map Geocode Error:", e); }
        }
    </script>
</body>
</html>
