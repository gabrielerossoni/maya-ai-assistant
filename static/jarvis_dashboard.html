<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAYA | Neural Interface</title>
    
    <!-- Three.js r128 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Leaflet 1.9.4 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --orb-color: 100, 160, 255;
            --bg-dark: #050505;
            --accent: #ff4b4b;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.4);
            --panel-bg: rgba(10, 10, 10, 0.95);
            --glass-border: 1px solid rgba(255, 255, 255, 0.08);
            --transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.listening { --orb-color: 255, 100, 100; }
        body.speaking  { --orb-color: 100, 220, 150; }
        body.processing { --orb-color: 255, 200, 50; }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* --- MAYA ORB --- */
        #maya-orb-container {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 280px; height: 280px;
            z-index: 100;
            transition: var(--transition);
            cursor: pointer;
        }

        #maya-orb-container.corner {
            top: 24px; left: 24px;
            transform: translate(0, 0);
            width: 90px; height: 90px;
        }

        #maya-orb {
            width: 100%; height: 100%;
            border-radius: 50%;
            position: relative;
            background: radial-gradient(circle, rgba(var(--orb-color), 0.2) 0%, transparent 70%);
            box-shadow: 0 0 40px rgba(var(--orb-color), 0.3);
            transition: var(--transition);
        }

        #orb-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 101;
        }

        /* --- CLOCK --- */
        #idle-clock {
            position: fixed;
            top: 65%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            transition: var(--transition);
        }
        #idle-clock .time { font-size: 80px; font-weight: 200; letter-spacing: -2px; }
        #idle-clock .date { font-size: 18px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 4px; }
        
        body.content-open #idle-clock { opacity: 0; visibility: hidden; transform: translate(-50%, -40%); }

        /* --- CONTENT AREA --- */
        #content-area {
            position: fixed;
            top: 0; right: -75vw;
            width: 75vw; height: 100vh;
            background: var(--panel-bg);
            border-left: var(--glass-border);
            z-index: 50;
            transition: var(--transition);
            padding: 40px;
            overflow-y: auto;
            backdrop-filter: blur(20px);
        }

        #content-area.open { right: 0; }

        .panel { display: none; height: 100%; flex-direction: column; gap: 30px; }
        .panel.active { display: flex; animation: fadeIn 0.5s ease forwards; }

        @keyframes fadeIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        /* --- PANELS STYLING --- */
        #panel-weather .temp-main { font-size: 140px; font-weight: 100; line-height: 1; }
        #panel-weather .forecast-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; }
        
        #panel-map { height: 100%; width: 100%; border-radius: 12px; overflow: hidden; }
        #map-container { height: 100%; width: 100%; }

        #panel-browser iframe { width: 100%; height: 100%; border: none; border-radius: 12px; background: white; }

        #panel-news .news-list { display: flex; flex-direction: column; gap: 20px; }
        .news-item { padding: 20px; border: var(--glass-border); border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .news-item:hover { background: rgba(255,255,255,0.05); }

        #panel-dashboard .dash-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .stat-card { padding: 30px; border: var(--glass-border); border-radius: 16px; background: rgba(255,255,255,0.02); }
        .stat-card h3 { font-size: 12px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 10px; }
        .stat-card .val { font-size: 32px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }

        /* --- CMD INPUT --- */
        #cmd-container {
            position: fixed;
            bottom: 60px; left: 50%;
            transform: translateX(-50%);
            width: 500px;
            z-index: 110;
            transition: var(--transition);
        }

        #cmd-container.corner {
            bottom: auto; top: 38px; left: 130px;
            transform: translateX(0);
            width: 350px;
        }

        #cmd-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: var(--glass-border);
            border-radius: 30px;
            padding: 15px 25px;
            color: white;
            font-size: 16px;
            outline: none;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }
        #cmd-input:focus { border-color: var(--orb-color); box-shadow: 0 0 15px rgba(0,242,255,0.2); }

        /* --- LOG STRIP --- */
        #log-strip {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            padding: 10px 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            font-size: 12px;
            color: var(--text-dim);
            z-index: 100;
            pointer-events: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- ARDUINO CONTROLS --- */
        .device-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .device-btn { padding: 15px; border: var(--glass-border); border-radius: 12px; background: rgba(255,255,255,0.05); text-align: center; font-weight: 600; }
        .device-btn.on { border-color: #4CAF50; color: #4CAF50; box-shadow: 0 0 10px rgba(76,175,80,0.2); }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    
    <div id="maya-orb-container" onclick="handleOrbClick()">
        <div id="maya-orb"></div>
        <canvas id="orb-canvas"></canvas>
    </div>

    <div id="idle-clock">
        <div class="time" id="clock-time">00:00</div>
        <div class="date" id="clock-date">LUNEDÌ, 1 GENNAIO</div>
    </div>

    <div id="cmd-container">
        <input type="text" id="cmd-input" placeholder="Comando neurale..." onkeydown="if(event.key==='Enter') sendCmd()">
    </div>

    <div id="content-area">
        <div id="panel-weather" class="panel">
            <h2 id="weather-city">Località</h2>
            <div class="temp-main"><span id="weather-temp">--</span>°</div>
            <div id="weather-desc" style="text-transform: uppercase; letter-spacing: 2px;">--</div>
            <div class="forecast-grid" id="weather-forecast"></div>
        </div>

        <div id="panel-map" class="panel">
            <div id="map-container"></div>
        </div>

        <div id="panel-browser" class="panel">
            <iframe id="browser-iframe" src="about:blank"></iframe>
        </div>

        <div id="panel-news" class="panel">
            <h2>Ultime Notizie</h2>
            <div class="news-list" id="news-list"></div>
        </div>

        <div id="panel-dashboard" class="panel">
            <h2>Sistema & Domotica</h2>
            <div class="dash-grid">
                <div class="stat-card">
                    <h3>Neural Load (CPU)</h3>
                    <div class="val" id="dash-cpu">--%</div>
                </div>
                <div class="stat-card">
                    <h3>Memory Unit (RAM)</h3>
                    <div class="val" id="dash-ram">--%</div>
                </div>
            </div>
            <div class="device-grid" style="margin-top: 20px;">
                <div id="dash-led" class="device-btn">LUCI</div>
                <div id="dash-relay" class="device-btn">RELAIS</div>
                <div id="dash-servo" class="device-btn">SERVO</div>
            </div>
        </div>
    </div>

    <div id="log-strip" id="log-text">MAYA System Online...</div>

    <script>
        let ws;
        let map;
        let audioContext, analyser, dataArray;
        let orbState = 'idle';
        
        // --- THREE.JS GLOBALS ---
        let scene, camera, renderer, mainOrb, outerRing, originalPositions;
        
        // --- INIZIALIZZAZIONE ---
        window.onload = () => {
            initBackground();
            initClock();
            initThree();
            animate();
            initWS();
        };

        function initThree() {
            const container = document.getElementById('maya-orb-container');
            const canvas = document.getElementById('orb-canvas');
            const w = container.clientWidth;
            const h = container.clientHeight;

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
            camera.position.z = 3;

            renderer = new THREE.WebGLRenderer({ 
                canvas: canvas,
                alpha: true, 
                antialias: true 
            });
            renderer.setSize(w, h);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setClearColor(0x000000, 0);

            // Main Orb
            const geometry = new THREE.SphereGeometry(1, 64, 64);
            originalPositions = geometry.attributes.position.array.slice();
            
            const material = new THREE.MeshBasicMaterial({ 
                wireframe: true, 
                transparent: true,
                opacity: 0.8
            });

            mainOrb = new THREE.Mesh(geometry, material);
            scene.add(mainOrb);

            // Outer Ring
            const outerGeom = new THREE.SphereGeometry(1.15, 16, 16);
            const outerMat = new THREE.MeshBasicMaterial({ 
                wireframe: true, 
                transparent: true, 
                opacity: 0.15 
            });
            outerRing = new THREE.Mesh(outerGeom, outerMat);
            scene.add(outerRing);
        }

        function animate(time) {
            requestAnimationFrame(animate);
            if (!renderer) return;

            // Update color from CSS var
            const rgb = getComputedStyle(document.documentElement).getPropertyValue('--orb-color').trim();
            const color = new THREE.Color(`rgb(${rgb})`);
            mainOrb.material.color = color;
            outerRing.material.color = color;

            // Audio Analysis
            let audioLevel = 0;
            if (dataArray) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for (let i = 0; i < 32; i++) sum += dataArray[i];
                audioLevel = sum / (32 * 255);
            }

            // Vertex Deformation
            const positions = mainOrb.geometry.attributes.position;
            const t = time * 0.001;

            for (let i = 0; i < positions.count; i++) {
                const ix = i * 3;
                const iy = i * 3 + 1;
                const iz = i * 3 + 2;

                const ox = originalPositions[ix];
                const oy = originalPositions[iy];
                const oz = originalPositions[iz];

                const vec = new THREE.Vector3(ox, oy, oz);
                const normal = vec.clone().normalize();
                
                let displacement = Math.sin(t * 2 + ox * 3) * 0.05;
                if (orbState !== 'idle' && dataArray) {
                    const fftSample = dataArray[i % 32] / 255;
                    displacement += audioLevel * 0.4 * fftSample;
                }

                positions.array[ix] = ox + normal.x * displacement;
                positions.array[iy] = oy + normal.y * displacement;
                positions.array[iz] = oz + normal.z * displacement;
            }
            positions.needsUpdate = true;

            // Rotation
            if (orbState === 'idle') {
                mainOrb.rotation.y += 0.002;
            } else {
                mainOrb.rotation.y += 0.008 + audioLevel * 0.02;
            }
            outerRing.rotation.y -= 0.001;
            outerRing.rotation.x += 0.0005;

            renderer.render(scene, camera);
        }

        function handleResize() {
            const container = document.getElementById('maya-orb-container');
            const w = container.clientWidth;
            const h = container.clientHeight;
            
            if (renderer) {
                renderer.setSize(w, h);
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
            }
        }
        
        // Sostituiamo il vecchio onresize
        window.addEventListener('resize', () => {
            // Background canvas resize logic
            const bgCanvas = document.getElementById('bg-canvas');
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
            handleResize();
        });


        async function initAudio() {
            if(audioContext) return;
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            } catch(e) { 
                console.log("Audio Init Failed (Permission Denied?):", e); 
                dataArray = new Uint8Array(128).fill(0);
            }
        }

        // --- WEBSOCKET & LOGIC ---
        function initWS() {
            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${proto}//${location.host}/ws`);
            
            ws.onmessage = (e) => {
                const d = JSON.parse(e.data);
                
                if(d.type === 'layout') setLayout(d.layout, d.params);
                if(d.type === 'voice_status') setOrbState(d.status.toLowerCase());
                if(d.type === 'stats') {
                    document.getElementById('dash-cpu').innerText = Math.round(d.neural_load) + '%';
                    document.getElementById('dash-ram').innerText = Math.round(d.memory) + '%';
                    if(d.voice_status) setOrbState(d.voice_status.toLowerCase());
                }
                if(d.type === 'weather' && d.data) updateWeather(d.data);
                if(d.type === 'news' && d.articles) updateNews(d.articles);
                if(d.type === 'state') updateArduino(d);
                if(d.type === 'spotify') {
                    if(d.is_playing) document.getElementById('log-strip').innerText = `♫ SPOTIFY: ${d.track} - ${d.artist}`;
                }
                if(d.type === 'stream') document.getElementById('log-strip').innerText = d.full_text;
            };

            ws.onopen = () => {
                document.getElementById('log-strip').innerText = "MAYA Neural Link Established.";
                initAudio();
            };
        }

        function setOrbState(status) {
            orbState = status || 'idle';
            document.body.className = orbState;
            document.getElementById('log-strip').innerText = `MAYA | ${orbState.toUpperCase()}`;
        }

        function setLayout(layout, params = {}) {
            const orb = document.getElementById('maya-orb-container');
            const content = document.getElementById('content-area');
            const cmd = document.getElementById('cmd-container');
            
            if(layout === 'orb') {
                orb.classList.remove('corner');
                content.classList.remove('open');
                cmd.classList.remove('corner');
                document.body.classList.remove('content-open');
                // Update Three.js size after CSS transition
                setTimeout(handleResize, 600);
                return;
            }

            orb.classList.add('corner');
            content.classList.add('open');
            cmd.classList.add('corner');
            document.body.classList.add('content-open');
            // Update Three.js size after CSS transition
            setTimeout(handleResize, 600);

            // Switch Panel
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            const target = document.getElementById(`panel-${layout}`);
            if(target) target.classList.add('active');

            if(layout === 'map' && params.location) updateMap(params.location);
            if(layout === 'browser' && params.url) document.getElementById('browser-iframe').src = params.url;
        }

        function handleOrbClick() {
            if(document.getElementById('maya-orb-container').classList.contains('corner')) {
                setLayout('orb');
            }
        }

        function sendCmd() {
            const input = document.getElementById('cmd-input');
            if(!input.value.trim()) return;
            ws.send(JSON.stringify({ type: 'command', text: input.value }));
            input.value = '';
        }

        // --- PANEL UPDATES ---
        function updateWeather(data) {
            document.getElementById('weather-city').innerText = data.location;
            document.getElementById('weather-temp').innerText = Math.round(data.temp);
            document.getElementById('weather-desc').innerText = "CONDIZIONI ATTUALI";
            
            const grid = document.getElementById('weather-forecast');
            grid.innerHTML = data.daily.map(day => `
                <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:12px; text-align:center;">
                    <div style="font-size:10px; opacity:0.5;">${new Date(day.date).toLocaleDateString('it-IT', {weekday:'short'})}</div>
                    <div style="font-weight:bold; margin:5px 0;">${Math.round(day.max)}°</div>
                    <div style="font-size:10px; opacity:0.3;">${Math.round(day.min)}°</div>
                </div>
            `).join('');
        }

        function updateNews(articles) {
            const list = document.getElementById('news-list');
            list.innerHTML = articles.map(a => `
                <div class="news-item" onclick="setLayout('browser', {url: '${a.link}'})">
                    <div style="font-size:10px; color:var(--orb-color); margin-bottom:5px;">${a.source || 'MAYA FEED'}</div>
                    <div style="font-weight:bold;">${a.title}</div>
                    <div style="font-size:13px; opacity:0.6; margin-top:8px;">${a.summary}</div>
                </div>
            `).join('');
        }

        function updateArduino(d) {
            const setBtn = (id, val) => {
                const el = document.getElementById(id);
                if(val === 'on' || val === 'open' || val === true) el.classList.add('on');
                else el.classList.remove('on');
            };
            if(d.led) setBtn('dash-led', d.led);
            if(d.relay) setBtn('dash-relay', d.relay);
            if(d.servo) setBtn('dash-servo', d.servo);
        }

        async function updateMap(query) {
            if(!map) {
                map = L.map('map-container', { zoomControl: false }).setView([41.9, 12.5], 10);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; CartoDB'
                }).addTo(map);
            }
            
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1`);
                const data = await res.json();
                if(data[0]) {
                    const { lat, lon } = data[0];
                    map.setView([lat, lon], 13);
                    L.marker([lat, lon]).addTo(map);
                }
            } catch(e) { console.error("Map Geocode Error:", e); }
        }
    </script>
</body>
</html>
