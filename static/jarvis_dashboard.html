<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAYA | Neural Interface</title>
    
    <!-- Three.js r128 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Leaflet 1.9.4 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --orb-color: 255, 30, 30;
            --bg-dark: #020000;
            --accent: #ff1a1a;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.4);
            --panel-bg: rgba(10, 0, 0, 0.9);
            --glass-border: 1px solid rgba(255, 0, 0, 0.3);
            --transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            --hud-color: rgba(255, 0, 0, 0.15);
        }

        @font-face {
            font-family: 'Geometos';
            src: url('https://fonts.cdnfonts.com/s/14885/Geometos.woff') format('woff');
        }

        body {
            background: radial-gradient(circle at center, #1a0000 0%, #020000 100%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            margin: 0;
        }

        /* --- HUD SCANLINES & VIGNETTE --- */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 200;
            opacity: 0.3;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 40%, black 150%);
            pointer-events: none;
            z-index: 201;
        }

        /* --- HUD CORNERS --- */
        .hud-corner {
            position: fixed;
            width: 100px; height: 100px;
            border: 2px solid var(--hud-color);
            z-index: 150;
            pointer-events: none;
        }
        .top-left { top: 30px; left: 30px; border-right: none; border-bottom: none; }
        .top-right { top: 30px; right: 30px; border-left: none; border-bottom: none; }
        .bottom-left { bottom: 30px; left: 30px; border-right: none; border-top: none; }
        .bottom-right { bottom: 30px; right: 30px; border-left: none; border-top: none; }

        /* --- MAYA ORB --- */
        #maya-orb-container {
            position: fixed;
            top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            width: 380px; height: 380px;
            z-index: 100;
            transition: var(--transition);
            cursor: pointer;
        }

        #maya-orb-container.corner {
            top: 100px; left: 100px;
            width: 140px; height: 140px;
        }

        #orb-branding {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Geometos', sans-serif;
            font-size: 18px;
            letter-spacing: 6px;
            color: rgba(255, 255, 255, 0.4);
            pointer-events: none;
            z-index: 102;
            text-align: center;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        body.content-open #orb-branding {
            font-size: 10px;
            letter-spacing: 3px;
        }

        #orb-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 101;
            filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.5));
        }

        /* --- CLOCK --- */
        #idle-clock {
            position: fixed;
            top: 75%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            transition: var(--transition);
        }
        #idle-clock .time { 
            font-family: 'Geometos', sans-serif;
            font-size: 100px; 
            font-weight: 100; 
            letter-spacing: 15px; 
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
            margin-bottom: 10px;
        }
        #idle-clock .date { 
            font-size: 16px; 
            color: var(--text-dim); 
            text-transform: uppercase; 
            letter-spacing: 12px;
            opacity: 0.5;
        }
        
        body.content-open #idle-clock { opacity: 0; visibility: hidden; transform: translate(-50%, -60%); }

        /* --- CONTENT AREA --- */
        #content-area {
            position: fixed;
            top: 0; right: -75vw;
            width: 75vw; height: 100vh;
            background: var(--panel-bg);
            border-left: var(--glass-border);
            z-index: 50;
            transition: var(--transition);
            padding: 40px;
            overflow-y: auto;
            backdrop-filter: blur(20px);
        }

        #content-area.open { right: 0; }

        .panel { display: none; height: 100%; flex-direction: column; gap: 30px; }
        .panel.active { display: flex; animation: fadeIn 0.5s ease forwards; }

        @keyframes fadeIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        /* --- PANELS STYLING --- */
        #panel-weather .temp-main { font-size: 140px; font-weight: 100; line-height: 1; }
        #panel-weather .forecast-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; }
        
        #panel-map { height: 100%; width: 100%; border-radius: 12px; overflow: hidden; }
        #map-container { height: 100%; width: 100%; }

        #panel-browser iframe { width: 100%; height: 100%; border: none; border-radius: 12px; background: white; }

        #panel-news .news-list { display: flex; flex-direction: column; gap: 20px; }
        .news-item { padding: 20px; border: var(--glass-border); border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .news-item:hover { background: rgba(255,255,255,0.05); }

        #panel-dashboard .dash-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .stat-card { padding: 30px; border: var(--glass-border); border-radius: 16px; background: rgba(255,255,255,0.02); }
        .stat-card h3 { font-size: 12px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 10px; }
        .stat-card .val { font-size: 32px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }

        /* --- CMD INPUT --- */
        #cmd-container {
            position: fixed;
            bottom: 60px; left: 50%;
            transform: translateX(-50%);
            width: 500px;
            z-index: 110;
            transition: var(--transition);
        }

        #cmd-container.corner {
            bottom: auto; top: 38px; left: 130px;
            transform: translateX(0);
            width: 350px;
        }

        #cmd-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: var(--glass-border);
            border-radius: 30px;
            padding: 15px 25px;
            color: white;
            font-size: 16px;
            outline: none;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }
        #cmd-input:focus { border-color: var(--orb-color); box-shadow: 0 0 15px rgba(0,242,255,0.2); }

        /* --- LOG STRIP --- */
        #log-strip {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            padding: 10px 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            font-size: 12px;
            color: var(--text-dim);
            z-index: 100;
            pointer-events: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- ARDUINO CONTROLS --- */
        .device-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .device-btn { padding: 15px; border: var(--glass-border); border-radius: 12px; background: rgba(255,255,255,0.05); text-align: center; font-weight: 600; }
        .device-btn.on { border-color: #4CAF50; color: #4CAF50; box-shadow: 0 0 10px rgba(76,175,80,0.2); }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    
    <div class="hud-corner top-left"></div>
    <div class="hud-corner top-right"></div>
    <div class="hud-corner bottom-left"></div>
    <div class="hud-corner bottom-right"></div>

    <div id="maya-orb-container" onclick="handleOrbClick()">
        <canvas id="orb-canvas"></canvas>
        <div id="orb-branding">M.A.Y.A</div>
    </div>

    <div id="idle-clock">
        <div class="time" id="clock-time">00:00</div>
        <div class="date" id="clock-date">LUNEDÌ, 1 GENNAIO</div>
    </div>

    <div id="cmd-container">
        <input type="text" id="cmd-input" placeholder="Comando neurale..." onkeydown="if(event.key==='Enter') sendCmd()">
    </div>

    <div id="content-area">
        <div id="panel-weather" class="panel">
            <h2 id="weather-city">Località</h2>
            <div class="temp-main"><span id="weather-temp">--</span>°</div>
            <div id="weather-desc" style="text-transform: uppercase; letter-spacing: 2px;">--</div>
            <div class="forecast-grid" id="weather-forecast"></div>
        </div>

        <div id="panel-map" class="panel">
            <div id="map-container"></div>
        </div>

        <div id="panel-browser" class="panel">
            <iframe id="browser-iframe" src="about:blank"></iframe>
        </div>

        <div id="panel-news" class="panel">
            <h2>Ultime Notizie</h2>
            <div class="news-list" id="news-list"></div>
        </div>

        <div id="panel-dashboard" class="panel">
            <h2>Sistema & Domotica</h2>
            <div class="dash-grid">
                <div class="stat-card">
                    <h3>Neural Load (CPU)</h3>
                    <div class="val" id="dash-cpu">--%</div>
                </div>
                <div class="stat-card">
                    <h3>Memory Unit (RAM)</h3>
                    <div class="val" id="dash-ram">--%</div>
                </div>
            </div>
            <div class="device-grid" style="margin-top: 20px;">
                <div id="dash-led" class="device-btn">LUCI</div>
                <div id="dash-relay" class="device-btn">RELAIS</div>
                <div id="dash-servo" class="device-btn">SERVO</div>
            </div>
        </div>
    </div>

    <div id="log-strip" id="log-text">MAYA System Online...</div>

    <script>
        let ws;
        let map;
        let audioContext, analyser, dataArray;
        let orbState = 'idle';
        
        // --- THREE.JS GLOBALS ---
        let scene, camera, renderer, mainOrb, originalPositions;

        // --- CLOCK ---
        function initClock() {
            const timeEl = document.getElementById('clock-time');
            const dateEl = document.getElementById('clock-date');
            
            function update() {
                const now = new Date();
                if (timeEl) {
                    timeEl.textContent = now.toLocaleTimeString('it-IT', {
                        hour: '2-digit', 
                        minute: '2-digit'
                    });
                }
                if (dateEl) {
                    dateEl.textContent = now.toLocaleDateString('it-IT', {
                        weekday: 'long', 
                        day: 'numeric', 
                        month: 'long'
                    }).toUpperCase();
                }
            }
            setInterval(update, 1000);
            update();
        }

        // --- BACKGROUND PARTICLES ---
        function initBackground() {
            const canvas = document.getElementById('bg-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let pts = [];
            
            const resize = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            };
            window.addEventListener('resize', resize);
            resize();

            for(let i=0; i<60; i++) {
                pts.push({
                    x: Math.random()*canvas.width,
                    y: Math.random()*canvas.height,
                    vx: (Math.random()-0.5)*0.5,
                    vy: (Math.random()-0.5)*0.5,
                    r: Math.random()*2
                });
            }

            function anim() {
                ctx.clearRect(0,0,canvas.width, canvas.height);
                ctx.fillStyle = 'rgba(255,255,255,0.1)';
                pts.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    if(p.x<0) p.x=canvas.width; if(p.x>canvas.width) p.x=0;
                    if(p.y<0) p.y=canvas.height; if(p.y>canvas.height) p.y=0;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                    ctx.fill();
                });
                requestAnimationFrame(anim);
            }
            anim();
        }

        // --- THREE.JS ORB ---
        function initThree() {
            const container = document.getElementById('maya-orb-container');
            const canvas = document.getElementById('orb-canvas');
            if (!container || !canvas) return;

            const w = container.clientWidth;
            const h = container.clientHeight;
            canvas.width = w;
            canvas.height = h;

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
            camera.position.z = 3.5;

            renderer = new THREE.WebGLRenderer({ 
                canvas: canvas,
                alpha: true, 
                antialias: true 
            });
            renderer.setSize(w, h);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setClearColor(0x000000, 0);

            // 1. Core Glowing Sphere
            const coreGeom = new THREE.IcosahedronGeometry(0.7, 15);
            const coreMat = new THREE.MeshBasicMaterial({
                color: 0xff0000,
                transparent: true,
                opacity: 0.2,
                blending: THREE.AdditiveBlending
            });
            mainOrb = new THREE.Mesh(coreGeom, coreMat);
            originalPositions = coreGeom.attributes.position.array.slice();
            scene.add(mainOrb);

            // 2. Shell
            const shellGeom = new THREE.IcosahedronGeometry(0.85, 10);
            const shellMat = new THREE.MeshBasicMaterial({
                color: 0xff2222,
                wireframe: true,
                transparent: true,
                opacity: 0.4,
                blending: THREE.AdditiveBlending
            });
            window.orbShell = new THREE.Mesh(shellGeom, shellMat);
            window.shellOrigPos = shellGeom.attributes.position.array.slice();
            scene.add(window.orbShell);

            // 3. Particles
            const partGeom = new THREE.BufferGeometry();
            const partCount = 1200;
            const posArray = new Float32Array(partCount * 3);
            for(let i=0; i<partCount*3; i++) {
                const r = 0.8 + Math.random() * 0.4;
                const phi = Math.random() * Math.PI * 2;
                const theta = Math.random() * Math.PI;
                posArray[i*3] = r * Math.sin(theta) * Math.cos(phi);
                posArray[i*3+1] = r * Math.sin(theta) * Math.sin(phi);
                posArray[i*3+2] = r * Math.cos(theta);
            }
            partGeom.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const partMat = new THREE.PointsMaterial({ 
                color: 0xff0000, 
                size: 0.015, 
                transparent: true, 
                opacity: 0.8,
                blending: THREE.AdditiveBlending 
            });
            window.orbParticles = new THREE.Points(partGeom, partMat);
            scene.add(window.orbParticles);

            // 4. Rings
            const ringGeom = new THREE.RingGeometry(0.95, 0.97, 64);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.2, side: THREE.DoubleSide });
            window.ring1 = new THREE.Mesh(ringGeom, ringMat);
            window.ring2 = new THREE.Mesh(ringGeom, ringMat);
            window.ring1.rotation.x = Math.PI / 2;
            scene.add(window.ring1);
            scene.add(window.ring2);
        }

        function animate(time) {
            requestAnimationFrame(animate);
            if (!renderer || !mainOrb) return;

            const t = time * 0.001;
            const rgb = getComputedStyle(document.documentElement).getPropertyValue('--orb-color').trim() || "255, 30, 30";
            const color = new THREE.Color(`rgb(${rgb})`);

            let audioLevel = 0;
            if (dataArray) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for (let i = 0; i < 64; i++) sum += dataArray[i];
                audioLevel = (sum / (64 * 255)) * 1.5;
            }

            // Deformations
            const pos = mainOrb.geometry.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                const ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;
                const ox = originalPositions[ix], oy = originalPositions[iy], oz = originalPositions[iz];
                const vec = new THREE.Vector3(ox, oy, oz).normalize();
                const noise = Math.sin(t * 4 + ox * 2 + oy * 3) * 0.05;
                const d = 0.7 + noise + (audioLevel * (Math.random() * 0.2));
                pos.array[ix] = vec.x * d;
                pos.array[iy] = vec.y * d;
                pos.array[iz] = vec.z * d;
            }
            pos.needsUpdate = true;

            const sPos = window.orbShell.geometry.attributes.position;
            for (let i = 0; i < sPos.count; i++) {
                const ix = i * 3;
                const ox = window.shellOrigPos[ix], oy = window.shellOrigPos[ix+1], oz = window.shellOrigPos[ix+2];
                const vec = new THREE.Vector3(ox, oy, oz).normalize();
                const spike = (orbState !== 'idle') ? audioLevel * (i % 5 === 0 ? 0.4 : 0.1) : 0;
                const d = 0.85 + Math.sin(t * 5 + i) * 0.02 + spike;
                sPos.array[ix] = vec.x * d;
                sPos.array[ix+1] = vec.y * d;
                sPos.array[ix+2] = vec.z * d;
            }
            sPos.needsUpdate = true;

            // Rotations
            window.orbParticles.rotation.y += 0.002 + audioLevel * 0.05;
            window.orbParticles.scale.setScalar(1.0 + audioLevel * 0.5);
            window.orbParticles.material.opacity = 0.3 + audioLevel * 0.7;
            window.ring1.rotation.y += 0.01 + audioLevel * 0.1;
            window.ring2.rotation.x += 0.005 + audioLevel * 0.1;
            mainOrb.rotation.y -= 0.002;
            
            mainOrb.material.color = color;
            window.orbShell.material.color = color;
            window.orbParticles.material.color = color;
            
            const scale = 1.0 + Math.sin(t * 10) * 0.01 + audioLevel * 0.2;
            scene.scale.setScalar(scale);

            renderer.render(scene, camera);
        }

        // --- MAIN ENTRY POINT ---
        window.addEventListener('load', async () => {
            initBackground();
            initClock();
            initThree();
            animate();
            initWS();
        });


        function handleResize() {
            const container = document.getElementById('maya-orb-container');
            const w = container.clientWidth;
            const h = container.clientHeight;
            
            if (renderer) {
                renderer.setSize(w, h);
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
            }
        }
        
        // Sostituiamo il vecchio onresize
        window.addEventListener('resize', () => {
            // Background canvas resize logic
            const bgCanvas = document.getElementById('bg-canvas');
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
            handleResize();
        });


        async function initAudio() {
            if(audioContext) return;
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            } catch(e) { 
                console.log("Audio Init Failed (Permission Denied?):", e); 
                dataArray = new Uint8Array(128).fill(0);
            }
        }

        // --- WEBSOCKET & LOGIC ---
        function initWS() {
            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${proto}//${location.host}/ws`);
            
            ws.onmessage = (e) => {
                const d = JSON.parse(e.data);
                
        if (d.type === 'layout') setLayout(d.layout, d.params);
        if (d.type === 'voice_status') setOrbState(d.status.toLowerCase());
        if (d.type === 'news' && d.articles) {
            updateNews(d.articles);
            // Il pannello non si apre più automaticamente qui,
            // si affida al comando 'layout' inviato dall'agente se necessario.
        }
                if(d.type === 'state') updateArduino(d);
                if(d.type === 'spotify') {
                    if(d.is_playing) document.getElementById('log-strip').innerText = `♫ SPOTIFY: ${d.track} - ${d.artist}`;
                }
                if(d.type === 'stream') document.getElementById('log-strip').innerText = d.full_text;
            };

            ws.onopen = () => {
                document.getElementById('log-strip').innerText = "MAYA Neural Link Established.";
                initAudio();
            };
        }

        function setOrbState(status) {
            orbState = status || 'idle';
            document.body.className = orbState;
            document.getElementById('log-strip').innerText = `MAYA | ${orbState.toUpperCase()}`;
        }

        function setLayout(layout, params = {}) {
            const orb = document.getElementById('maya-orb-container');
            const content = document.getElementById('content-area');
            const cmd = document.getElementById('cmd-container');
            
            if(layout === 'orb') {
                orb.classList.remove('corner');
                content.classList.remove('open');
                cmd.classList.remove('corner');
                document.body.classList.remove('content-open');
                // Update Three.js size after CSS transition
                setTimeout(handleResize, 600);
                return;
            }

            orb.classList.add('corner');
            content.classList.add('open');
            cmd.classList.add('corner');
            document.body.classList.add('content-open');
            // Update Three.js size after CSS transition
            setTimeout(handleResize, 600);

            // Switch Panel
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            const target = document.getElementById(`panel-${layout}`);
            if(target) target.classList.add('active');

            if(layout === 'map' && params.location) updateMap(params.location);
            if(layout === 'browser' && params.url) document.getElementById('browser-iframe').src = params.url;
        }

        function handleOrbClick() {
            if(document.getElementById('maya-orb-container').classList.contains('corner')) {
                setLayout('orb');
            }
        }

        function sendCmd() {
            const input = document.getElementById('cmd-input');
            if(!input.value.trim()) return;
            ws.send(JSON.stringify({ type: 'command', text: input.value }));
            input.value = '';
        }

        // --- PANEL UPDATES ---
        function updateWeather(data) {
            document.getElementById('weather-city').innerText = data.location;
            document.getElementById('weather-temp').innerText = Math.round(data.temp);
            document.getElementById('weather-desc').innerText = "CONDIZIONI ATTUALI";
            
            const grid = document.getElementById('weather-forecast');
            grid.innerHTML = data.daily.map(day => `
                <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:12px; text-align:center;">
                    <div style="font-size:10px; opacity:0.5;">${new Date(day.date).toLocaleDateString('it-IT', {weekday:'short'})}</div>
                    <div style="font-weight:bold; margin:5px 0;">${Math.round(day.max)}°</div>
                    <div style="font-size:10px; opacity:0.3;">${Math.round(day.min)}°</div>
                </div>
            `).join('');
        }

        function updateNews(articles) {
            const list = document.getElementById('news-list');
            list.innerHTML = articles.map(a => `
                <div class="news-item" onclick="setLayout('browser', {url: '${a.link}'})">
                    <div style="font-size:10px; color:var(--orb-color); margin-bottom:5px;">${a.source || 'MAYA FEED'}</div>
                    <div style="font-weight:bold;">${a.title}</div>
                    <div style="font-size:13px; opacity:0.6; margin-top:8px;">${a.summary}</div>
                </div>
            `).join('');
        }

        function updateArduino(d) {
            const setBtn = (id, val) => {
                const el = document.getElementById(id);
                if(val === 'on' || val === 'open' || val === true) el.classList.add('on');
                else el.classList.remove('on');
            };
            if(d.led) setBtn('dash-led', d.led);
            if(d.relay) setBtn('dash-relay', d.relay);
            if(d.servo) setBtn('dash-servo', d.servo);
        }

        async function updateMap(query) {
            if(!map) {
                map = L.map('map-container', { zoomControl: false }).setView([41.9, 12.5], 10);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; CartoDB'
                }).addTo(map);
            }
            
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1`);
                const data = await res.json();
                if(data[0]) {
                    const { lat, lon } = data[0];
                    map.setView([lat, lon], 13);
                    L.marker([lat, lon]).addTo(map);
                }
            } catch(e) { console.error("Map Geocode Error:", e); }
        }
    </script>
</body>
</html>
